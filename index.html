<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBISCO | Shop Smart. Live Better.</title>

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header class="header">

        <div class="logo">
            <img src="images/LOGO IBISCO.png" alt="IBISCO">
        </div>
    
        <div class="search-box">
            <input type="text" placeholder="Search for products...">
        </div>
    
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">New Arrivals</a>
            <a href="#">Offers</a>
            <a href="#">Contact</a>
        </nav>
    
        <div class="icons">
            <span>♡</span>
            <span>👤</span>
            <span>🛒</span>
        </div>
    
    </header>
    <section class="hero">

    <div class="slides">

        <img src="images/hero/fashion.png" class="slide active">

        <img src="images/hero/footwear.png" class="slide">

        <img src="images/hero/jewellery.png" class="slide">

        <img src="images/hero/home.png" class="slide">

        <img src="images/hero/kids.png" class="slide">

    </div>

    <div class="hero-overlay">

        <button class="shop-btn">SHOP NOW</button>

    </div>

    <div class="dots">

        <span class="dot active"></span>

        <span class="dot"></span>

        <span class="dot"></span>

        <span class="dot"></span>

        <span class="dot"></span>

    </div>

</section>


    <section class="categories">
        <section class="featured">

    <h2>Featured Collection</h2>

    <div class="featured-grid">

        <div class="product-card">

    <span class="badge">20% OFF</span>

    <img src="images/products/product1.png" alt="Premium T-Shirt">

    <h3>Premium T-Shirt</h3>

    <div class="price-box">
        <span class="new-price">₹799</span>
        <span class="old-price">₹999</span>
    </div>

    <button>View Product</button>

</div>

       <div class="product-card">

    <span class="badge">15% OFF</span>

    <img src="images/products/product2.png" alt="Table lamp">

    <h3>Table lamp</h3>

    <div class="price-box">
        <span class="new-price">₹1499</span>
        <span class="old-price">₹1799</span>
    </div>

    <button>View Details</button>

</div>

        <div class="product-card">

    <span class="badge">15% OFF</span>

    <img src="images/products/product3.png" alt="Luxury Jewellery">

    <h3>Luxury Jewellery</h3>

    <div class="price-box">
        <span class="new-price">₹1499</span>
        <span class="old-price">₹1799</span>
    </div>

    <button>View Details</button>

</div>

      <div class="product-card">

    <span class="badge">15% OFF</span>

    <img src="images/products/product4.png" alt="Running Shoes">

    <h3>Running Shoes</h3>

    <div class="price-box">
        <span class="new-price">₹1499</span>
        <span class="old-price">₹1799</span>
    </div>

    <button>View Details</button>

</div>

    </div>

</section>

        <h2>Shop by Categories</h2>
    
        <div class="category-grid">
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Fashion" alt="">
                <h3>Fashion</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Footwear" alt="">
                <h3>Footwear</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Jewellery" alt="">
                <h3>Jewellery</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Home" alt="">
                <h3>Home Essentials</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Toys" alt="">
                <h3>Toys</h3>
            </div>
    
        </div>
    
    </section>
    
    <script src="js/main.js"></script>


</body>
</html>
