<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBISCO | Shop Smart. Live Better.</title>

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header class="header">

        <div class="logo">
            <img src="images/LOGO IBISCO.png" alt="IBISCO">
        </div>
    
        <div class="search-box">
            <input type="text" placeholder="Search for products...">
        </div>
    
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">New Arrivals</a>
            <a href="#">Offers</a>
            <a href="#">Contact</a>
        </nav>
    
        <div class="icons">
            <span>♡</span>
            <span>👤</span>
            <span>🛒</span>
        </div>
    
    </header>

    <section class="hero">

        <div class="hero-content">
            <h1>SHOP SMART.</h1>
            <h2>LIVE BETTER.</h2>
    
            <p>
                Discover Fashion, Footwear, Jewellery,
                Home Essentials and Toys — All in One Place.
            </p>
    
            <button>SHOP NOW</button>
        </div>
    
    </section>

    <section class="categories">

        <h2>Shop by Categories</h2>
    
        <div class="category-grid">
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Fashion" alt="">
                <h3>Fashion</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Footwear" alt="">
                <h3>Footwear</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Jewellery" alt="">
                <h3>Jewellery</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Home" alt="">
                <h3>Home Essentials</h3>
            </div>
    
            <div class="category-card">
                <img src="https://via.placeholder.com/250x250?text=Toys" alt="">
                <h3>Toys</h3>
            </div>
    
        </div>
    
    </section>
    
    <script src="js/main.js"></script>


</body>
</html>
